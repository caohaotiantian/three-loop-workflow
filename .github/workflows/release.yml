name: release
on:
  push:
    tags:
      - 'v*'
jobs:
  build-skill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build the .skill archive
        run: zip -r three-loop-workflow.skill three-loop-workflow/
      - name: Attach to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: three-loop-workflow.skill
